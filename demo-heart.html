<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herzanimation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #222222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      gap: 120px;
    }

    .demo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 120px;
      height: 120px;
    }

    .pulse-ring {
      position: absolute;
      width: 48px;
      height: 48px;
      background: #F9B338;
      opacity: 0;
      top: 50%;
      left: 50%;
      margin-top: -24px;
      margin-left: -24px;
    }

    .pulse-ring.circle { border-radius: 50%; }

    .pulse-ring.heart {
      clip-path: path('M4 19a11 11 0 0 1 19.182-7.352 1.12 1.12 0 0 0 1.636 0A10.98 10.98 0 0 1 44 19c0 4.58-3 8-6 11l-10.984 10.626a4 4 0 0 1-6 .038L10 30c-3-3-6-6.4-6-11');
    }

    .heart-icon {
      position: relative;
      z-index: 1;
      color: #F9B338;
      width: 48px;
      height: 48px;
    }
  </style>
</head>
<body>

  <!-- Left: circle pulse (old) -->
  <div class="demo-wrap" id="demo-circle">
    <div class="pulse-ring circle"></div>
    <div class="pulse-ring circle"></div>
    <div class="pulse-ring circle"></div>
    <svg class="heart-icon" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round"
         aria-hidden="true">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
  </div>

  <!-- Right: heart-shaped pulse (new) -->
  <div class="demo-wrap" id="demo-heart">
    <div class="pulse-ring heart"></div>
    <div class="pulse-ring heart"></div>
    <div class="pulse-ring heart"></div>
    <svg class="heart-icon" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round"
         aria-hidden="true">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
  </div>

  <script src="js/gsap.min.js"></script>
  <script>
    const tl1 = gsap.timeline({ repeat: -1 });
    tl1.fromTo('#demo-circle .pulse-ring',
      { scale: 1, opacity: 0.5 },
      { scale: 2.2, opacity: 0, duration: 1.8, stagger: 0.6, ease: 'power1.out' });

    const tl2 = gsap.timeline({ repeat: -1 });
    tl2.fromTo('#demo-heart .pulse-ring',
      { scale: 1, opacity: 0.5 },
      { scale: 2.2, opacity: 0, duration: 1.8, stagger: 0.6, ease: 'power1.out' });
  </script>
</body>
</html>
